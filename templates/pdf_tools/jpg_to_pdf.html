<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JPG to PDF UI</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  color: white;
  background: radial-gradient(circle at center, #020617, #000000);
}

.wrapper {
  padding: 100px 60px;
}

.main-card {
  max-width: 1600px;
  margin: auto;
  border-radius: 30px;
  padding: 2px;
  background: linear-gradient(90deg, #00f0ff, #6a00ff, #00f0ff);
  background-size: 300% 300%;
  animation: borderMove 4s linear infinite;
}

@keyframes borderMove {
  0% { background-position: 0% }
  100% { background-position: 300% }
}

.inner-card {
  background: rgba(20, 30, 80, 0.35);
  border-radius: 28px;
  padding: 25px;
  display: flex;
  gap: 25px;
  backdrop-filter: blur(25px);
}

/* LEFT */
.left { flex: 1.5; }

.file-box {
  margin-top: 15px;
  background: rgba(255,255,255,0.9);
  border-radius: 10px;
  padding: 8px;
  display: flex;
  justify-content: space-between;
  color: black;
}

.convert-btn {
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  background: gray;
  cursor: not-allowed;
}

/* ACTIVE BUTTON */
.active {
  background: linear-gradient(90deg,#ff4ecd,#4ecbff);
  cursor: pointer;
}

/* CARDS */
.center, .right {
  flex: 1;
  background: rgba(0,0,0,0.2);
  padding: 15px;
  border-radius: 12px;
  backdrop-filter: blur(15px);
}

/* HIDE INITIALLY */
.hidden {
  display: none;
}

.download {
  margin-top: 12px;
  padding: 10px;
  border-radius: 8px;
  background: gray;
  cursor: not-allowed;
}

.download.active {
  background: linear-gradient(90deg,#4ecbff,#a64dff);
  cursor: pointer;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="main-card">
<div class="inner-card">

<!-- LEFT -->
<div class="left">
  <h2>JPG to PDF</h2>

  <div class="file-box">
    <input type="file" id="fileInput">
  </div>

  <div id="convertBtn" class="convert-btn">Convert to PDF</div>
</div>

<!-- CENTER -->
<div class="center hidden" id="progressCard">
  <h3>Your file is being converted...</h3>
  <p id="timeText">Estimated time: 15 seconds</p>

  <p id="step1">○ Uploading file — 2s</p>
  <p id="step2">○ Processing — 8s</p>
  <p id="step3">○ Finalizing — 5s</p>
</div>

<!-- RIGHT -->
<div class="right hidden" id="doneCard">
  <h3 id="doneText">Processing...</h3>
  <div id="downloadBtn" class="download">Download PDF</div>
  <div>Convert another file →</div>
</div>

</div>
</div>

</div>

<script>
const fileInput = document.getElementById("fileInput");
const convertBtn = document.getElementById("convertBtn");
const progressCard = document.getElementById("progressCard");
const doneCard = document.getElementById("doneCard");
const downloadBtn = document.getElementById("downloadBtn");

let time = 15;

/* ENABLE BUTTON AFTER FILE SELECT */
fileInput.addEventListener("change", () => {
  convertBtn.classList.add("active");
  convertBtn.style.cursor = "pointer";
});

/* CONVERT CLICK */
convertBtn.addEventListener("click", () => {
  if (!convertBtn.classList.contains("active")) return;

  progressCard.classList.remove("hidden");
  doneCard.classList.remove("hidden");

  let interval = setInterval(() => {
    time--;
    document.getElementById("timeText").innerText =
      "Estimated time: " + time + " seconds";

    if (time === 13) document.getElementById("step1").innerText = "✔ Uploading file — done";
    if (time === 7) document.getElementById("step2").innerText = "✔ Processing — done";
    if (time === 2) document.getElementById("step3").innerText = "✔ Finalizing — done";

    if (time <= 0) {
      clearInterval(interval);
      document.getElementById("doneText").innerText = "Conversion complete!";
      downloadBtn.classList.add("active");
    }
  }, 1000);
});
</script>

</body>
</html>
