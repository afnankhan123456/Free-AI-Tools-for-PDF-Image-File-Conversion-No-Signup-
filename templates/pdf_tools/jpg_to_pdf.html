<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Final UI</title>

<style>
body {
  margin: 0;
  background: #000;
  font-family: Arial, sans-serif;
  color: white;
}

.wrapper {
  padding: 100px 60px;
}

/* MAIN CARD */
.main-card {
  position: relative;
  width: 100%;
  max-width: 1600px;
  margin: auto;
  border-radius: 30px;
  padding: 2px; /* IMPORTANT for border */

  background: linear-gradient(90deg, #00f0ff, #6a00ff, #00f0ff);
  background-size: 300% 300%;
  animation: borderMove 4s linear infinite;
}

/* INNER CONTENT CARD */
.inner-card {
  background: linear-gradient(135deg, #0b2cff, #6a00ff, #d100ff);
  border-radius: 28px;
  padding: 25px;
  display: flex;
  gap: 25px;
}

/* ANIMATION */
@keyframes borderMove {
  0% { background-position: 0% }
  100% { background-position: 300% }
}

/* LEFT */
.left { flex: 1.5; }

.icon {
  width: 55px;
  height: 55px;
  border-radius: 12px;
  background: linear-gradient(135deg,#3bb2ff,#6f5bff);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: bold;
}

h1 { margin: 5px 0; }

.file-box {
  margin-top: 15px;
  background: white;
  border-radius: 10px;
  padding: 8px;
  display: flex;
  justify-content: space-between;
  color: black;
}

.file-btn {
  padding: 6px 12px;
  border-radius: 8px;
  background: linear-gradient(90deg,#3bb2ff,#8a2be2);
  color: white;
}

.convert-btn {
  margin-top: 15px;
  padding: 12px;
  border-radius: 10px;
  text-align: center;
  background: linear-gradient(90deg,#ff4ecd,#4ecbff);
  font-weight: bold;
}

/* CENTER */
.center {
  flex: 1.1;
  background: rgba(0,0,0,0.25);
  padding: 15px;
  border-radius: 12px;
}

.progress {
  height: 6px;
  background: #111;
  border-radius: 10px;
  margin: 10px 0;
  overflow: hidden;
}

.fill {
  width: 58%;
  height: 100%;
  background: linear-gradient(90deg,#4ecbff,#a64dff);
}

/* RIGHT */
.right {
  flex: 0.9;
  background: rgba(0,0,0,0.25);
  padding: 15px;
  border-radius: 12px;
  text-align: center;
}

.check {
  width: 50px;
  height: 50px;
  background: #00c853;
  border-radius: 50%;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: center;
}

.download {
  margin-top: 12px;
  padding: 10px;
  border-radius: 8px;
  background: linear-gradient(90deg,#4ecbff,#a64dff);
}

.link {
  margin-top: 8px;
  font-size: 12px;
  color: #ccc;
}
</style>
</head>

<body>

<div class="wrapper">

<div class="main-card">

  <div class="inner-card">

    <!-- LEFT -->
    <div class="left">
      <div class="icon">JPG</div>
      <h1>JPG to PDF</h1>

      <div class="file-box">
        <span>Choose file</span>
        <div class="file-btn">Choose file</div>
      </div>

      <div class="convert-btn">Convert to PDF</div>
    </div>

    <!-- CENTER -->
    <div class="center">
      <h3>Your file is being converted...</h3>
      <p>Estimated time: 15 seconds</p>

      <div class="progress">
        <div class="fill"></div>
      </div>

      <p>✔ Uploading file — 2s</p>
      <p>✔ Processing — 8s</p>
      <p>○ Finalizing — 5s</p>
    </div>

    <!-- RIGHT -->
    <div class="right">
      <div class="check">✔</div>

      <h3>Conversion complete!</h3>
      <p>Your PDF is ready</p>

      <div class="download">Download PDF</div>
      <div class="link">Convert another file →</div>
    </div>

  </div>

</div>

</div>

</body>
</html>
