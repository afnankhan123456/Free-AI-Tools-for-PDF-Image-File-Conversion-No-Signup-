<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JPG to PDF Converter</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#000;font-family:Arial,sans-serif;color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;}
.wrapper{padding:40px 24px;width:100%;}
.main-card{max-width:1400px;margin:auto;border-radius:32px;padding:2px;background:linear-gradient(90deg,#00f0ff,#6a00ff,#00f0ff);background-size:300%300%;animation:borderMove 4s linear infinite;}
.inner-card{background:linear-gradient(135deg,#0b2cff,#6a00ff,#d100ff);border-radius:30px;padding:28px 32px;display:flex;gap:28px;flex-wrap:wrap;}
@keyframes borderMove{0%{background-position:0%}100%{background-position:300%}}
.left{flex:1.5;min-width:220px;}
.icon{width:60px;height:60px;border-radius:16px;background:linear-gradient(135deg,#3bb2ff,#6f5bff);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.4rem;margin-bottom:12px;}
h1{margin:8px 0 5px;font-size:1.8rem;}
.file-box{margin-top:25px;background:rgba(255,255,255,0.95);border-radius:60px;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;color:#111;font-weight:500;}
.file-btn{padding:8px 18px;border-radius:40px;background:linear-gradient(90deg,#3bb2ff,#8a2be2);color:#fff;cursor:pointer;font-weight:bold;}
.convert-btn{margin-top:20px;padding:14px;border-radius:60px;text-align:center;background:linear-gradient(90deg,#ff4ecd,#4ecbff);font-weight:bold;cursor:pointer;}
.convert-btn.disabled{opacity:0.6;cursor:not-allowed;pointer-events:none;}
.center{flex:1.1;background:rgba(0,0,0,0.35);padding:20px;border-radius:24px;min-width:240px;}
.progress{height:8px;background:#1e1e2f;border-radius:20px;margin:18px 0 20px;overflow:hidden;}
.fill{width:0%;height:100%;background:linear-gradient(90deg,#4ecbff,#a64dff);transition:width 0.25s;}
.step-list p{margin:10px 0;display:flex;align-items:center;gap:12px;font-size:0.9rem;}
.right{flex:0.9;background:rgba(0,0,0,0.35);padding:20px;border-radius:24px;text-align:center;}
.check{width:58px;height:58px;background:#00c853;border-radius:50%;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:32px;}
.download{margin-top:20px;padding:12px;border-radius:60px;background:linear-gradient(90deg,#4ecbff,#a64dff);font-weight:bold;cursor:pointer;}
.download.disabled{opacity:0.5;pointer-events:none;}
.link{margin-top:16px;font-size:13px;color:#ddd;text-decoration:underline;cursor:pointer;}
@media (max-width:850px){.inner-card{flex-direction:column;}}
</style>
</head>
<body>
<div class="wrapper">
<div class="main-card"><div class="inner-card">

<div class="left">
<div class="icon">JPG</div>
<h1>JPG to PDF</h1>
<div class="file-box"><span id="fileName">Choose file</span><div class="file-btn" id="chooseBtn">Browse</div></div>
<div class="convert-btn disabled" id="convertBtn">Convert to PDF</div>
</div>

<div class="center">
<h3 id="statusTitle">Ready to convert</h3>
<p id="etaText">Select a JPG image first</p>
<div class="progress"><div class="fill" id="progressFill"></div></div>
<div class="step-list">
<p id="step1"><span>⭘</span> Uploading file — 0s</p>
<p id="step2"><span>⭘</span> Processing image — 0s</p>
<p id="step3"><span>⭘</span> Finalizing PDF — 0s</p>
</div>
</div>

<div class="right">
<div class="check">✔</div>
<h3>Conversion complete!</h3>
<p>Your PDF is ready</p>
<div class="download disabled" id="downloadBtn">Download PDF</div>
<div class="link" id="resetLink">Convert another file →</div>
</div>

</div></div>
</div>

<script>
const fileInput=Object.assign(document.createElement('input'),{type:'file',accept:'image/jpeg,image/jpg',style:'display:none'});
document.body.appendChild(fileInput);
const elements={fileName:document.getElementById('fileName'),convertBtn:document.getElementById('convertBtn'),downloadBtn:document.getElementById('downloadBtn'),resetLink:document.getElementById('resetLink'),progressFill:document.getElementById('progressFill'),statusTitle:document.getElementById('statusTitle'),etaText:document.getElementById('etaText'),step1:document.getElementById('step1'),step2:document.getElementById('step2'),step3:document.getElementById('step3')};
let selectedFile=null,isConverting=false,conversionDone=false,pdfBlob=null,timer=null;

function resetUI(resetFile=true){
  if(timer){clearInterval(timer);timer=null;}
  isConverting=false;conversionDone=false;pdfBlob=null;
  elements.progressFill.style.width='0%';
  elements.step1.innerHTML='<span>⭘</span> Uploading file — 0s';
  elements.step2.innerHTML='<span>⭘</span> Processing image — 0s';
  elements.step3.innerHTML='<span>⭘</span> Finalizing PDF — 0s';
  elements.statusTitle.innerText='Ready to convert';
  elements.etaText.innerText='Select a JPG image first';
  elements.downloadBtn.classList.add('disabled');
  if(resetFile){selectedFile=null;elements.fileName.innerText='Choose file';fileInput.value='';}
  updateConvertBtn();
}

function updateConvertBtn(){
  if(selectedFile && !isConverting && !conversionDone){
    elements.convertBtn.classList.remove('disabled');
    elements.etaText.innerText='Ready to start conversion';
  }else{
    elements.convertBtn.classList.add('disabled');
    if(isConverting) elements.etaText.innerText='Conversion in progress...';
    else if(conversionDone) elements.etaText.innerText='Conversion done. Use "Convert another"';
    else if(!selectedFile) elements.etaText.innerText='Select a JPG file first';
  }
}

function startConversion(){
  if(!selectedFile) return;
  isConverting=true;conversionDone=false;pdfBlob=null;
  updateConvertBtn();
  elements.statusTitle.innerText='Converting...';
  let uploadSec=0,processSec=0,finalSec=0,uploadDone=false,processDone=false,finalDone=false;
  const maxUpload=2,maxProcess=6,maxFinal=5;
  const stepEls=[elements.step1,elements.step2,elements.step3];
  function updateSteps(){
    if(!uploadDone)stepEls[0].innerHTML=`<span>⏳</span> Uploading file — ${Math.floor(uploadSec)}s`;
    else stepEls[0].innerHTML=`<span>✔</span> Uploading file — ${maxUpload}s`;
    if(!processDone && uploadDone)stepEls[1].innerHTML=`<span>⏳</span> Processing image — ${Math.floor(processSec)}s`;
    else if(processDone)stepEls[1].innerHTML=`<span>✔</span> Processing image — ${maxProcess}s`;
    else stepEls[1].innerHTML=`<span>⭘</span> Processing image — 0s`;
    if(!finalDone && processDone)stepEls[2].innerHTML=`<span>⏳</span> Finalizing PDF — ${Math.floor(finalSec)}s`;
    else if(finalDone)stepEls[2].innerHTML=`<span>✔</span> Finalizing PDF — ${maxFinal}s`;
    else stepEls[2].innerHTML=`<span>⭘</span> Finalizing PDF — 0s`;
    let percent=0;
    if(!uploadDone)percent=(uploadSec/maxUpload)*20;
    else if(!processDone)percent=20+((processSec/maxProcess)*50);
    else if(!finalDone)percent=70+((finalSec/maxFinal)*30);
    else percent=100;
    elements.progressFill.style.width=Math.min(100,percent)+'%';
    if(!uploadDone)elements.etaText.innerText=`Uploading... ${Math.max(0,maxUpload-Math.floor(uploadSec))}s left`;
    else if(!processDone)elements.etaText.innerText=`Processing... ${Math.max(0,maxProcess-Math.floor(processSec))}s left`;
    else if(!finalDone)elements.etaText.innerText=`Finalizing... ${Math.max(0,maxFinal-Math.floor(finalSec))}s left`;
    else elements.etaText.innerText='Finalizing... Done!';
  }
  timer=setInterval(()=>{
    if(!isConverting){clearInterval(timer);return;}
    if(!uploadDone){uploadSec+=0.3;if(uploadSec>=maxUpload){uploadSec=maxUpload;uploadDone=true;}}
    else if(!processDone){processSec+=0.45;if(processSec>=maxProcess){processSec=maxProcess;processDone=true;}}
    else if(!finalDone){finalSec+=0.38;if(finalSec>=maxFinal){finalSec=maxFinal;finalDone=true;}}
    updateSteps();
    if(uploadDone&&processDone&&finalDone){
      clearInterval(timer);timer=null;
      pdfBlob=new Blob([`%PDF simulated for ${selectedFile.name}`],{type:'application/pdf'});
      isConverting=false;conversionDone=true;
      elements.statusTitle.innerText='Conversion completed!';
      elements.etaText.innerText='PDF ready to download';
      elements.progressFill.style.width='100%';
      elements.downloadBtn.classList.remove('disabled');
      elements.convertBtn.classList.add('disabled');
    }
  },300);
}

document.getElementById('chooseBtn').onclick=()=>{if(!isConverting)fileInput.click();};
fileInput.onchange=(e)=>{
  if(e.target.files?.length){
    const f=e.target.files[0];
    if(f.type==='image/jpeg'||f.type==='image/jpg'||f.name.match(/\.jpe?g$/i)){
      selectedFile=f;
      elements.fileName.innerText=f.name.length>28?f.name.slice(0,24)+'...':f.name;
      if(conversionDone)resetUI(false);
      conversionDone=false;
      updateConvertBtn();
    }else alert('Please select a valid JPG file');
  }
};
elements.convertBtn.onclick=()=>{if(selectedFile && !isConverting && !conversionDone)startConversion();else if(conversionDone)alert('Conversion done. Click "Convert another file"');else if(!selectedFile)alert('Please select a JPG file first.');};
elements.downloadBtn.onclick=()=>{if(conversionDone && pdfBlob){const a=document.createElement('a');a.href=URL.createObjectURL(pdfBlob);a.download=(selectedFile?selectedFile.name.replace(/\.jpe?g$/i,'.pdf'):'document.pdf');a.click();URL.revokeObjectURL(a.href);}else alert('No PDF ready. Convert an image first.');};
elements.resetLink.onclick=()=>{if(isConverting){alert('Please wait, conversion in progress.');return;}resetUI(true);conversionDone=false;pdfBlob=null;if(timer)clearInterval(timer);isConverting=false;updateConvertBtn();elements.progressFill.style.width='0%';elements.statusTitle.innerText='Ready to convert';elements.etaText.innerText='Select a JPG image first';};
resetUI(true);
</script>
</body>
</html>
