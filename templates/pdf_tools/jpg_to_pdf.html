<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JPG to PDF | Light Blue Glass</title>
<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  background: radial-gradient(circle at 20% 30%, #a8d8ff, #6bb5ff, #3a8cff);
  font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, 'Arial', sans-serif;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 20px;
}

.wrapper {
  width: 100%;
  max-width: 1400px;
  margin: 0 auto;
}

/* MAIN CARD - light blue glass effect */
.main-card {
  background: rgba(200, 225, 255, 0.25);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 48px;
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 25px 45px rgba(0, 0, 0, 0.15), inset 0 1px 2px rgba(255,255,255,0.3);
  overflow: hidden;
  transition: all 0.3s ease;
}

.inner-card {
  display: flex;
  gap: 28px;
  padding: 36px 40px;
  flex-wrap: wrap;
  background: rgba(150, 200, 255, 0.1);
}

/* LEFT SECTION */
.left {
  flex: 1.5;
  min-width: 240px;
}

.icon {
  width: 68px;
  height: 68px;
  border-radius: 24px;
  background: linear-gradient(135deg, #7bc5ff, #4a9eff);
  backdrop-filter: blur(4px);
  border: 1px solid rgba(255,255,255,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1.6rem;
  margin-bottom: 18px;
  color: white;
  box-shadow: 0 8px 20px rgba(58,140,255,0.3);
}

h1 {
  font-size: 2rem;
  font-weight: 700;
  background: linear-gradient(135deg, #ffffff, #c8e4ff);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  letter-spacing: -0.3px;
  margin: 8px 0 5px 0;
}

.file-box {
  margin-top: 32px;
  background: rgba(255, 255, 255, 0.25);
  backdrop-filter: blur(8px);
  border-radius: 80px;
  padding: 10px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #1a3a6e;
  font-weight: 600;
  border: 1px solid rgba(255,255,255,0.4);
  transition: all 0.2s;
}

.file-btn {
  padding: 8px 20px;
  border-radius: 40px;
  background: linear-gradient(95deg, #5cb0ff, #3a8cff);
  backdrop-filter: blur(4px);
  color: white;
  cursor: pointer;
  font-weight: 600;
  font-size: 0.85rem;
  transition: 0.2s;
  border: none;
  box-shadow: 0 2px 8px rgba(58,140,255,0.3);
}

.file-btn:hover {
  transform: scale(0.97);
  background: linear-gradient(95deg, #4aa0ff, #2a7cff);
}

.convert-btn {
  margin-top: 24px;
  padding: 14px 16px;
  border-radius: 60px;
  text-align: center;
  background: linear-gradient(105deg, #5cb0ff, #3a8cff, #5cb0ff);
  backdrop-filter: blur(4px);
  font-weight: bold;
  cursor: pointer;
  transition: all 0.25s;
  font-size: 1rem;
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
  letter-spacing: 0.5px;
  box-shadow: 0 6px 14px rgba(58,140,255,0.3);
}

.convert-btn.disabled {
  opacity: 0.5;
  cursor: not-allowed;
  pointer-events: none;
  filter: grayscale(0.1);
}

.convert-btn:not(.disabled):hover {
  transform: translateY(-3px);
  background: linear-gradient(105deg, #6cbaff, #4a9eff);
  box-shadow: 0 12px 22px rgba(58,140,255,0.4);
}

/* CENTER - light blue glass panel */
.center {
  flex: 1.1;
  background: rgba(180, 215, 255, 0.3);
  backdrop-filter: blur(12px);
  border-radius: 32px;
  padding: 24px 26px;
  border: 1px solid rgba(255, 255, 255, 0.4);
  min-width: 250px;
}

.center h3 {
  font-size: 1.4rem;
  font-weight: 600;
  margin-bottom: 12px;
  color: #1a3a6e;
}

.progress {
  height: 8px;
  background: rgba(0, 0, 0, 0.15);
  border-radius: 20px;
  margin: 20px 0 24px;
  overflow: hidden;
}

.fill {
  width: 0%;
  height: 100%;
  background: linear-gradient(90deg, #5cb0ff, #3a8cff, #7bc5ff);
  border-radius: 20px;
  transition: width 0.25s ease;
  box-shadow: 0 0 6px #5cb0ff;
}

.step-list p {
  margin: 14px 0;
  display: flex;
  align-items: center;
  gap: 14px;
  font-size: 0.92rem;
  color: #1a3a6e;
  font-weight: 500;
  background: rgba(255,255,255,0.2);
  padding: 6px 12px;
  border-radius: 40px;
  backdrop-filter: blur(2px);
}

/* RIGHT - light blue glass panel */
.right {
  flex: 0.9;
  background: rgba(180, 215, 255, 0.3);
  backdrop-filter: blur(12px);
  border-radius: 32px;
  padding: 28px 20px;
  text-align: center;
  border: 1px solid rgba(255, 255, 255, 0.4);
  transition: all 0.2s;
}

.check {
  width: 68px;
  height: 68px;
  background: linear-gradient(145deg, #4caf50, #2e7d32);
  backdrop-filter: blur(4px);
  border-radius: 50%;
  margin: 0 auto 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  font-weight: bold;
  box-shadow: 0 8px 20px rgba(46,125,50,0.3);
  border: 1px solid rgba(255,255,255,0.5);
  color: white;
}

.right h3 {
  font-size: 1.5rem;
  margin-bottom: 6px;
  font-weight: 600;
  color: #1a3a6e;
}

.download {
  margin-top: 28px;
  padding: 12px 16px;
  border-radius: 60px;
  background: linear-gradient(95deg, #5cb0ff, #3a8cff);
  backdrop-filter: blur(4px);
  font-weight: bold;
  cursor: pointer;
  transition: 0.2s;
  border: 1px solid rgba(255,255,255,0.4);
  color: white;
}

.download.disabled {
  opacity: 0.45;
  pointer-events: none;
}

.download:not(.disabled):hover {
  transform: translateY(-2px);
  background: linear-gradient(95deg, #6cbaff, #4a9eff);
  box-shadow: 0 8px 18px rgba(58,140,255,0.4);
}

.link {
  margin-top: 22px;
  font-size: 13px;
  color: #1a3a6e;
  text-decoration: underline;
  cursor: pointer;
  transition: 0.2s;
  font-weight: 500;
}

.link:hover {
  color: #0a2a4e;
  text-shadow: 0 0 4px rgba(90,170,255,0.5);
}

/* responsive */
@media (max-width: 880px) {
  .inner-card {
    padding: 24px 22px;
    gap: 20px;
  }
  .icon {
    width: 54px;
    height: 54px;
    font-size: 1.3rem;
  }
  h1 {
    font-size: 1.6rem;
  }
}
</style>
</head>
<body>
<div class="wrapper">
<div class="main-card">
<div class="inner-card">

  <!-- LEFT -->
  <div class="left">
    <div class="icon">🖼️</div>
    <h1>JPG to PDF</h1>
    <div class="file-box">
      <span id="fileName">Choose file</span>
      <div class="file-btn" id="chooseBtn">Browse</div>
    </div>
    <div class="convert-btn disabled" id="convertBtn">Convert to PDF</div>
  </div>

  <!-- CENTER - realtime progress -->
  <div class="center">
    <h3 id="statusTitle">Ready to convert</h3>
    <p id="etaText" style="font-size:0.85rem; opacity:0.8;">Select a JPG image first</p>
    <div class="progress"><div class="fill" id="progressFill"></div></div>
    <div class="step-list">
      <p id="step1"><span>○</span> Uploading file — 0s</p>
      <p id="step2"><span>○</span> Processing image — 0s</p>
      <p id="step3"><span>○</span> Finalizing PDF — 0s</p>
    </div>
  </div>

  <!-- RIGHT - download panel -->
  <div class="right">
    <div class="check">✓</div>
    <h3>Conversion complete!</h3>
    <p style="opacity:0.8;">Your PDF is ready</p>
    <div class="download disabled" id="downloadBtn">Download PDF</div>
    <div class="link" id="resetLink">Convert another file →</div>
  </div>

</div>
</div>
</div>

<script>
// DOM elements
const fileInput = Object.assign(document.createElement('input'), { type: 'file', accept: 'image/jpeg,image/jpg', style: 'display:none' });
document.body.appendChild(fileInput);

const elements = {
  fileName: document.getElementById('fileName'),
  convertBtn: document.getElementById('convertBtn'),
  downloadBtn: document.getElementById('downloadBtn'),
  resetLink: document.getElementById('resetLink'),
  progressFill: document.getElementById('progressFill'),
  statusTitle: document.getElementById('statusTitle'),
  etaText: document.getElementById('etaText'),
  step1: document.getElementById('step1'),
  step2: document.getElementById('step2'),
  step3: document.getElementById('step3')
};

let selectedFile = null;
let isConverting = false;
let conversionDone = false;
let pdfBlob = null;
let progressInterval = null;

// Reset UI fully
function resetFullUI(resetFile = true) {
  if (progressInterval) { clearInterval(progressInterval); progressInterval = null; }
  isConverting = false;
  conversionDone = false;
  pdfBlob = null;
  elements.progressFill.style.width = '0%';
  elements.step1.innerHTML = '<span>○</span> Uploading file — 0s';
  elements.step2.innerHTML = '<span>○</span> Processing image — 0s';
  elements.step3.innerHTML = '<span>○</span> Finalizing PDF — 0s';
  elements.statusTitle.innerText = 'Ready to convert';
  elements.etaText.innerText = 'Select a JPG image first';
  elements.downloadBtn.classList.add('disabled');
  
  if (resetFile) {
    selectedFile = null;
    elements.fileName.innerText = 'Choose file';
    fileInput.value = '';
  }
  updateConvertButtonState();
}

function updateConvertButtonState() {
  if (selectedFile && !isConverting && !conversionDone) {
    elements.convertBtn.classList.remove('disabled');
    elements.etaText.innerText = 'Ready to start conversion';
  } else {
    elements.convertBtn.classList.add('disabled');
    if (isConverting) elements.etaText.innerText = 'Conversion in progress...';
    else if (conversionDone) elements.etaText.innerText = 'PDF ready — use "Convert another"';
    else if (!selectedFile) elements.etaText.innerText = 'Select a JPG image first';
  }
}

// Real-time conversion simulation
function startRealTimeConversion() {
  if (!selectedFile) return;
  isConverting = true;
  conversionDone = false;
  pdfBlob = null;
  updateConvertButtonState();
  elements.statusTitle.innerText = 'Converting...';
  
  let uploadSec = 0, processSec = 0, finalSec = 0;
  let uploadDone = false, processDone = false, finalDone = false;
  const MAX_UPLOAD = 2;
  const MAX_PROCESS = 6;
  const MAX_FINAL = 5;
  
  function updateStepsUI() {
    // upload step
    if (!uploadDone) elements.step1.innerHTML = `<span>⏳</span> Uploading file — ${Math.floor(uploadSec)}s`;
    else elements.step1.innerHTML = `<span>✓</span> Uploading file — ${MAX_UPLOAD}s`;
    
    // processing step
    if (!processDone && uploadDone) elements.step2.innerHTML = `<span>⏳</span> Processing image — ${Math.floor(processSec)}s`;
    else if (processDone) elements.step2.innerHTML = `<span>✓</span> Processing image — ${MAX_PROCESS}s`;
    else elements.step2.innerHTML = `<span>○</span> Processing image — 0s`;
    
    // finalizing step
    if (!finalDone && processDone) elements.step3.innerHTML = `<span>⏳</span> Finalizing PDF — ${Math.floor(finalSec)}s`;
    else if (finalDone) elements.step3.innerHTML = `<span>✓</span> Finalizing PDF — ${MAX_FINAL}s`;
    else elements.step3.innerHTML = `<span>○</span> Finalizing PDF — 0s`;
    
    let percent = 0;
    if (!uploadDone) percent = (uploadSec / MAX_UPLOAD) * 20;
    else if (!processDone) percent = 20 + ((processSec / MAX_PROCESS) * 50);
    else if (!finalDone) percent = 70 + ((finalSec / MAX_FINAL) * 30);
    else percent = 100;
    elements.progressFill.style.width = Math.min(100, percent) + '%';
    
    // update eta text
    if (!uploadDone) elements.etaText.innerText = `Uploading... ${Math.max(0, MAX_UPLOAD - Math.floor(uploadSec))}s left`;
    else if (!processDone) elements.etaText.innerText = `Processing... ${Math.max(0, MAX_PROCESS - Math.floor(processSec))}s left`;
    else if (!finalDone) elements.etaText.innerText = `Finalizing... ${Math.max(0, MAX_FINAL - Math.floor(finalSec))}s left`;
    else elements.etaText.innerText = 'Conversion complete!';
  }
  
  progressInterval = setInterval(() => {
    if (!isConverting) {
      if (progressInterval) clearInterval(progressInterval);
      return;
    }
    
    if (!uploadDone) {
      uploadSec += 0.3;
      if (uploadSec >= MAX_UPLOAD) { uploadSec = MAX_UPLOAD; uploadDone = true; }
    } 
    else if (!processDone) {
      processSec += 0.45;
      if (processSec >= MAX_PROCESS) { processSec = MAX_PROCESS; processDone = true; }
    }
    else if (!finalDone) {
      finalSec += 0.38;
      if (finalSec >= MAX_FINAL) { finalSec = MAX_FINAL; finalDone = true; }
    }
    
    updateStepsUI();
    
    // finish conversion
    if (uploadDone && processDone && finalDone) {
      clearInterval(progressInterval);
      progressInterval = null;
      // generate mock pdf blob
      pdfBlob = new Blob([`%PDF-1.4\nSimulated JPG to PDF content for: ${selectedFile.name}`], { type: 'application/pdf' });
      isConverting = false;
      conversionDone = true;
      elements.statusTitle.innerText = 'Conversion completed!';
      elements.etaText.innerText = 'Your PDF is ready to download';
      elements.progressFill.style.width = '100%';
      elements.downloadBtn.classList.remove('disabled');
      elements.convertBtn.classList.add('disabled');
    }
  }, 300);
}

// Event listeners
document.getElementById('chooseBtn').onclick = () => {
  if (!isConverting) fileInput.click();
};

fileInput.onchange = (e) => {
  if (e.target.files && e.target.files.length) {
    const file = e.target.files[0];
    if (file.type === 'image/jpeg' || file.type === 'image/jpg' || file.name.match(/\.jpe?g$/i)) {
      selectedFile = file;
      elements.fileName.innerText = file.name.length > 30 ? file.name.slice(0, 26) + '...' : file.name;
      // if conversion was previously done, reset but keep file
      if (conversionDone) {
        resetFullUI(false);
        conversionDone = false;
      }
      conversionDone = false;
      updateConvertButtonState();
    } else {
      alert('Please select a valid JPG / JPEG image.');
      selectedFile = null;
      elements.fileName.innerText = 'Choose file';
      fileInput.value = '';
      updateConvertButtonState();
    }
  }
};

elements.convertBtn.onclick = () => {
  if (!selectedFile) {
    alert('Please select a JPG file first.');
    return;
  }
  if (isConverting) return;
  if (conversionDone) {
    alert('PDF already converted! Click "Convert another file" to start fresh.');
    return;
  }
  startRealTimeConversion();
};

elements.downloadBtn.onclick = () => {
  if (!conversionDone || !pdfBlob) {
    alert('No PDF available. Please convert an image first.');
    return;
  }
  const downloadUrl = URL.createObjectURL(pdfBlob);
  const a = document.createElement('a');
  const fileName = selectedFile ? selectedFile.name.replace(/\.jpe?g$/i, '.pdf') : 'converted_image.pdf';
  a.href = downloadUrl;
  a.download = fileName;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(downloadUrl);
};

elements.resetLink.onclick = () => {
  if (isConverting) {
    alert('Please wait, conversion is in progress.');
    return;
  }
  // full reset: remove file, clear all states
  if (progressInterval) clearInterval(progressInterval);
  resetFullUI(true);
  conversionDone = false;
  pdfBlob = null;
  isConverting = false;
  elements.progressFill.style.width = '0%';
  elements.statusTitle.innerText = 'Ready to convert';
  elements.etaText.innerText = 'Select a JPG image first';
  elements.step1.innerHTML = '<span>○</span> Uploading file — 0s';
  elements.step2.innerHTML = '<span>○</span> Processing image — 0s';
  elements.step3.innerHTML = '<span>○</span> Finalizing PDF — 0s';
  updateConvertButtonState();
};

// initial state
resetFullUI(true);
</script>
</body>
</html>
