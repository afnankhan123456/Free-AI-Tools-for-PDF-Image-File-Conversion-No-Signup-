<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JPG to PDF | Premium Converter</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background: linear-gradient(135deg, #0a0e2a 0%, #1a1a3e 50%, #2d1b4e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Roboto, sans-serif;
            padding: 20px;
        }
        /* MAIN CARD - BORDER ONLY GLOW MOVING */
        .main-card{
            position: relative;
            background: rgba(20, 25, 55, 0.65);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 35px;
            max-width: 1050px;
            width: 100%;
            border: 1px solid rgba(255,255,255,0.1);
        }
        /* MOVING BORDER GLOW - ONLY ON EDGES (2px thickness, moves like a snake) */
        .main-card::before{
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            background: linear-gradient(90deg, #3b82f6, #06b6d4, #a855f7, #ec4899, #3b82f6);
            background-size: 300% 100%;
            border-radius: 30px;
            z-index: -1;
            animation: borderMove 3s linear infinite;
            opacity: 0.7;
        }
        @keyframes borderMove{
            0%{background-position: 0% 50%;}
            100%{background-position: 300% 50%;}
        }
        /* 2 COLUMN LAYOUT */
        .row{
            display: flex;
            gap: 35px;
            flex-wrap: wrap;
        }
        .left, .right{
            flex: 1;
            min-width: 250px;
        }
        /* LEFT SIDE */
        .jpg-icon{
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            width: 60px;
            height: 60px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: white;
            margin-bottom: 15px;
        }
        h1{
            font-size: 32px;
            color: white;
            margin-bottom: 12px;
        }
        .desc{
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 25px;
        }
        .file-area{
            background: rgba(255,255,255,0.08);
            border: 1px dashed rgba(255,255,255,0.3);
            border-radius: 14px;
            padding: 12px 18px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            margin-bottom: 18px;
        }
        .file-area:hover{
            background: rgba(59,130,246,0.15);
            border-color: #3b82f6;
        }
        .gradient-btn{
            background: linear-gradient(95deg, #3b82f6, #a855f7, #ec4899);
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 12px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
            transition: 0.2s;
        }
        .gradient-btn:hover{
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(59,130,246,0.4);
        }
        /* RIGHT SIDE - 3 CARDS INSIDE */
        .card-small{
            background: rgba(25, 30, 60, 0.5);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 18px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.2s;
        }
        .progress-bar-bg{
            background: rgba(255,255,255,0.1);
            border-radius: 30px;
            height: 6px;
            margin: 12px 0;
            overflow: hidden;
        }
        .progress-fill{
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #a855f7);
            border-radius: 30px;
            transition: width 0.2s;
        }
        .steps{
            display: flex;
            justify-content: space-between;
            margin: 15px 0 10px;
        }
        .step{
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            color: #ccc;
        }
        .step.active{
            background: linear-gradient(120deg, #3b82f6, #a855f7);
            color: white;
        }
        .percentage-big{
            font-size: 36px;
            font-weight: bold;
            color: white;
            text-align: center;
            margin: 10px 0;
        }
        .check-icon{
            font-size: 48px;
            text-align: center;
        }
        .download-btn-small{
            background: linear-gradient(95deg, #3b82f6, #a855f7);
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            color: white;
            cursor: pointer;
            width: 100%;
            margin-top: 12px;
            font-weight: 600;
        }
        .another-link{
            text-align: center;
            margin-top: 12px;
            font-size: 12px;
            color: #9bb5ff;
            cursor: pointer;
            text-decoration: underline;
        }
        .hidden{ display: none; }
        .status-text{
            font-size: 12px;
            color: #aab8ff;
            margin-top: 8px;
            text-align: center;
        }
        @media (max-width: 700px){
            .main-card{padding: 20px;}
            h1{font-size: 26px;}
        }
    </style>
</head>
<body>
<div class="main-card">
    <div class="row">
        <!-- LEFT SECTION -->
        <div class="left">
            <div class="jpg-icon">JPG</div>
            <h1>JPG to PDF</h1>
            <p class="desc">Convert your JPG images into high-quality PDF instantly. Fast, secure & free.</p>
            <div class="file-area" id="fileClickArea">
                <span id="fileNameText">📁 Choose JPG file</span>
            </div>
            <input type="file" id="fileInput" accept=".jpg,.jpeg" style="display:none">
            <button class="gradient-btn" id="convertBtn">Convert to PDF</button>
            <div class="status-text" style="margin-top:12px">Max 10MB · JPG/JPEG only</div>
        </div>

        <!-- RIGHT SECTION - 3 CARDS (dynamic) -->
        <div class="right">
            <!-- CARD 1: INITIAL (welcome) -->
            <div id="cardInitial" class="card-small" style="text-align:center">
                <div style="font-size:36px">✨</div>
                <div style="color:white; margin:8px 0">Ready to convert</div>
                <div style="color:#8e9ed4; font-size:12px">Select a JPG image</div>
            </div>

            <!-- CARD 2: PROGRESS CARD -->
            <div id="cardProgress" class="card-small hidden">
                <div style="color:white; font-weight:500; margin-bottom:8px">Converting...</div>
                <div class="steps">
                    <span class="step" id="step1">Uploading</span>
                    <span class="step" id="step2">Processing</span>
                    <span class="step" id="step3">Finalizing</span>
                </div>
                <div class="percentage-big" id="percentNum">0%</div>
                <div class="progress-bar-bg"><div class="progress-fill" id="progressFillBar"></div></div>
                <div class="status-text" id="progressMsgText">Starting...</div>
            </div>

            <!-- CARD 3: COMPLETE CARD -->
            <div id="cardComplete" class="card-small hidden">
                <div class="check-icon">✅</div>
                <div style="color:white; font-size:20px; font-weight:600; margin:8px 0">Conversion complete!</div>
                <button id="downloadPdfBtn" class="download-btn-small">📥 Download PDF</button>
                <div class="another-link" id="anotherFileBtn">Convert another file →</div>
            </div>
        </div>
    </div>
</div>

<script>
    // DOM elements
    const fileInput = document.getElementById('fileInput');
    const fileArea = document.getElementById('fileClickArea');
    const fileNameSpan = document.getElementById('fileNameText');
    const convertTrigger = document.getElementById('convertBtn');
    
    const cardInit = document.getElementById('cardInitial');
    const cardProgress = document.getElementById('cardProgress');
    const cardComplete = document.getElementById('cardComplete');
    
    const step1 = document.getElementById('step1');
    const step2 = document.getElementById('step2');
    const step3 = document.getElementById('step3');
    const percentSpan = document.getElementById('percentNum');
    const fillBar = document.getElementById('progressFillBar');
    const progressMsgSpan = document.getElementById('progressMsgText');
    const downloadBtn = document.getElementById('downloadPdfBtn');
    const anotherBtn = document.getElementById('anotherFileBtn');
    
    let currentFile = null;
    let pdfBlobUrl = null;
    let animationId = null;
    
    // open file picker
    fileArea.onclick = () => fileInput.click();
    fileInput.onchange = () => {
        if(fileInput.files.length){
            currentFile = fileInput.files[0];
            fileNameSpan.innerHTML = `📄 ${currentFile.name.substring(0, 25)}`;
            fileNameSpan.style.color = "#6ee7ff";
        } else {
            currentFile = null;
            fileNameSpan.innerHTML = "📁 Choose JPG file";
            fileNameSpan.style.color = "white";
        }
    };
    
    // Helper: reset UI to initial
    function resetToInitial(){
        if(pdfBlobUrl){ URL.revokeObjectURL(pdfBlobUrl); pdfBlobUrl = null; }
        cardInit.classList.remove('hidden');
        cardProgress.classList.add('hidden');
        cardComplete.classList.add('hidden');
        currentFile = null;
        fileInput.value = '';
        fileNameSpan.innerHTML = "📁 Choose JPG file";
        fileNameSpan.style.color = "white";
        if(animationId) clearInterval(animationId);
    }
    
    // function to set active step (only border active style)
    function setActiveStep(stepName){
        step1.classList.remove('active');
        step2.classList.remove('active');
        step3.classList.remove('active');
        if(stepName === 'upload') step1.classList.add('active');
        if(stepName === 'process') step2.classList.add('active');
        if(stepName === 'final') step3.classList.add('active');
    }
    
    // update progress UI (percentage + bar)
    function updateProgress(percent){
        let p = Math.min(100, Math.max(0, percent));
        percentSpan.innerText = Math.floor(p) + '%';
        fillBar.style.width = p + '%';
    }
    
    // Simulate progress with dynamic steps (border moves only around main card, not inside)
    async function runSimulation(file){
        return new Promise((resolve) => {
            const duration = 2800; // 2.8 sec total
            const start = performance.now();
            setActiveStep('upload');
            progressMsgSpan.innerText = 'Uploading image...';
            updateProgress(0);
            
            function stepFrame(now){
                const elapsed = now - start;
                let percent = (elapsed / duration) * 100;
                if(percent >= 100){
                    updateProgress(100);
                    setActiveStep('final');
                    progressMsgSpan.innerText = 'Finalizing PDF...';
                    setTimeout(() => resolve(), 200);
                    return;
                }
                updateProgress(percent);
                if(percent < 40){
                    if(!step1.classList.contains('active')) setActiveStep('upload');
                    progressMsgSpan.innerText = 'Uploading image...';
                } else if(percent < 75){
                    if(!step2.classList.contains('active')) setActiveStep('process');
                    progressMsgSpan.innerText = 'Processing pixels...';
                } else {
                    if(!step3.classList.contains('active')) setActiveStep('final');
                    progressMsgSpan.innerText = 'Creating PDF file...';
                }
                requestAnimationFrame(stepFrame);
            }
            requestAnimationFrame(stepFrame);
        });
    }
    
    // REAL PDF GENERATION using canvas + jspdf (lightweight, dynamic load)
    function generateRealPDF(imageFile){
        return new Promise((resolve, reject) => {
            // dynamically load jsPDF only if needed
            if(window.jspdf){
                createPdfWithLib(imageFile, resolve, reject);
            } else {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                script.onload = () => createPdfWithLib(imageFile, resolve, reject);
                script.onerror = () => reject(new Error('PDF library failed'));
                document.head.appendChild(script);
            }
        });
    }
    
    function createPdfWithLib(file, resolve, reject){
        const { jsPDF } = window.jspdf;
        const reader = new FileReader();
        reader.onload = (e) => {
            const imgData = e.target.result;
            const img = new Image();
            img.onload = () => {
                const pdf = new jsPDF({
                    orientation: img.width > img.height ? 'landscape' : 'portrait',
                    unit: 'mm'
                });
                const imgWidth = pdf.internal.pageSize.getWidth();
                const imgHeight = (img.height * imgWidth) / img.width;
                pdf.addImage(imgData, 'JPEG', 0, 0, imgWidth, imgHeight);
                const blob = pdf.output('blob');
                resolve(blob);
            };
            img.onerror = () => reject(new Error('Image load error'));
            img.src = imgData;
        };
        reader.onerror = () => reject(new Error('File read error'));
        reader.readAsDataURL(file);
    }
    
    // main conversion handler
    async function startConversion(file){
        if(!file){
            alert('Please select a JPG/JPEG image');
            return;
        }
        // switch UI
        cardInit.classList.add('hidden');
        cardProgress.classList.remove('hidden');
        cardComplete.classList.add('hidden');
        updateProgress(0);
        setActiveStep('upload');
        progressMsgSpan.innerText = 'Starting...';
        
        try {
            // run both simulation and real pdf generation
            const simPromise = runSimulation(file);
            const pdfPromise = generateRealPDF(file);
            await simPromise;
            const pdfBlob = await pdfPromise;
            // complete
            updateProgress(100);
            setActiveStep('final');
            progressMsgSpan.innerText = 'Done!';
            setTimeout(() => {
                cardProgress.classList.add('hidden');
                cardComplete.classList.remove('hidden');
                if(pdfBlobUrl) URL.revokeObjectURL(pdfBlobUrl);
                pdfBlobUrl = URL.createObjectURL(pdfBlob);
                // attach download event
                const newDownloadBtn = downloadBtn.cloneNode(true);
                downloadBtn.parentNode.replaceChild(newDownloadBtn, downloadBtn);
                newDownloadBtn.onclick = () => {
                    if(pdfBlobUrl){
                        const a = document.createElement('a');
                        a.href = pdfBlobUrl;
                        a.download = 'converted.pdf';
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                    }
                };
            }, 150);
        } catch(err){
            cardProgress.classList.add('hidden');
            cardInit.classList.remove('hidden');
            alert('Conversion failed: ' + err.message);
            resetToInitial();
        }
    }
    
    // event binding
    convertTrigger.onclick = () => {
        if(currentFile){
            startConversion(currentFile);
        } else {
            alert('Please choose a JPG image first');
        }
    };
    
    anotherBtn.onclick = () => {
        resetToInitial();
    };
    
    // clean up
    window.addEventListener('beforeunload', ()=>{
        if(pdfBlobUrl) URL.revokeObjectURL(pdfBlobUrl);
    });
</script>
</body>
</html>
